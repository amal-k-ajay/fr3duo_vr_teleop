common_base_frame: mount_link

left:
  hand_side: left
  base_frame: mount_link
  ee_frame: left_fr3v2_hand_tcp
  other_ee_frame: right_fr3v2_hand_tcp
  pose_topic: /oculus/left_controller_pose
  button_topic: /oculus/left_controller_buttons
  twist_topic: /left/servo_node/delta_twist_cmds
  gripper_action: /left_hand_controller/gripper_cmd
  servo_start_service: /left/servo_node/start_servo
  gripper_open_width: 0.020
  gripper_closed_width: 0.0
  gripper_max_command_width: 0.020
  gripper_max_effort: 20.0
  gripper_trigger_axis_index: 3
  gripper_command_period: 0.1
  gripper_command_min_delta: 0.001
  linear_multiplier: 0.9
  angular_multiplier: 0.9
  kp_linear: 20.0
  kp_angular: 20.0
  collision_distance: 0.0
  controller_to_robot_rotation: [0.440 ,0.174 ,-0.881 , -0.500, -0.767, -0.401, -0.746,  0.617, -0.251 ]

right:
  hand_side: right
  base_frame: mount_link
  ee_frame: right_fr3v2_hand_tcp
  other_ee_frame: left_fr3v2_hand_tcp
  pose_topic: /oculus/right_controller_pose
  button_topic: /oculus/right_controller_buttons
  twist_topic: /right/servo_node/delta_twist_cmds
  gripper_action: /right_hand_controller/gripper_cmd
  servo_start_service: /right/servo_node/start_servo
  gripper_open_width: 0.020
  gripper_closed_width: 0.0
  gripper_max_command_width: 0.020
  gripper_max_effort: 20.0
  gripper_trigger_axis_index: 3
  gripper_command_period: 0.1
  gripper_command_min_delta: 0.001
  linear_multiplier: 0.9
  angular_multiplier: 0.9
  kp_linear: 8.0
  kp_angular: 8.0
  collision_distance: 0.20
  controller_to_robot_rotation: [-0.440 , 0.174, -0.881, -0.500 , 0.767 , 0.401, 0.746 , 0.617, -0.251 ]
